name: Update data

on:
  schedule:
    - cron: "17 3 * * *" # daily, ~06:17 Israel time
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency: data-pipeline

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Check out the tip of main, not the SHA that triggered the run. Without
      # this, re-running an old failed run replays it against a stale commit
      # and the push below can never fast-forward. fetch-depth 0 gives the
      # rebase in "Commit and push" the history it needs.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline tests
        run: pytest tests/ -q
        working-directory: .

      - name: Refresh RATAG closures (when source URL configured)
        run: python pipeline/fetch_ratag.py
        env:
          RATAG_KMZ_URL: ${{ vars.RATAG_KMZ_URL }}

      - name: Watch CAA/AIP sources for changes
        run: python pipeline/watch_aip.py
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check consolidated AIP update file (קובץ עדכון)
        run: python pipeline/check_update_file.py
        env:
          GH_TOKEN: ${{ github.token }}

      # Auto-apply: normal-sized changes are published without review
      # (validate.py below still gates the commit); a suspicious change
      # volume skips the apply and opens a review issue instead.
      - name: Refresh A-17 zones from the official PDF (auto-apply)
        run: python pipeline/fetch_a17.py --apply --guard
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate data files
        run: python pipeline/validate.py

      - name: Build manifest and gzipped payloads
        run: python pipeline/build_manifest.py

      # Heartbeat: publish WHEN the pipeline last ran, as a static file on
      # GitHub Pages. The app reads this instead of the GitHub Actions API,
      # whose unauthenticated per-IP rate limit is shared by everyone behind
      # the same carrier NAT. Changes every run, so the commit below always
      # has something to push (a "pulse" even when the data itself didn't move).
      - name: Write heartbeat (when sources were last checked)
        run: |
          printf '{"lastRun": "%s"}\n' "$(date -u +%FT%TZ)" > docs/heartbeat.json

      - name: Keep scheduled workflow alive (monthly touch)
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            date -u +%Y-%m > .github/.keepalive
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data docs .github/.keepalive 2>/dev/null || git add data docs
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "data: automated update $(date -u +%F)"
            # A concurrent run (or a human) may have pushed while this job was
            # working. Replay our commit on top rather than failing outright.
            # A real file conflict still fails loudly, which is what we want.
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then
                exit 0
              fi
              echo "push attempt $attempt failed; retrying"
              sleep 5
            done
            echo "could not push after 3 attempts" >&2
            exit 1
          fi

      # Daily push to the user's phone on EVERY successful run (his choice:
      # a positive daily signal, so a silent day means the pipeline is stuck).
      # The topic name is a secret — the repo is public and anyone who knows
      # the topic could spam or snoop it. Notification failure must not fail
      # a run that already published fine, hence the trailing "|| true".
      - name: Push success notification (ntfy)
        if: success()
        run: |
          BODY="הצינור היומי רץ בהצלחה. גרסת נתונים: $(python -c "import json;print(json.load(open('docs/manifest.json'))['dataVersion'])")"
          curl -s --max-time 30 \
            -H "Title: NOTAM data pipeline OK" \
            -H "Tags: white_check_mark" \
            -d "$BODY" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" > /dev/null || true

      - name: Open issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "Data pipeline failed $(date -u +%F)" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}
